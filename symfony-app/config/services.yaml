services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Service\PhoenixService\PhoenixApiClientInterface:
        alias: App\Service\PhoenixService\PhoenixApiClient

    App\Service\PhoenixService\PhoenixApiClient:
        arguments:
            $phoenixBaseUrl: '%env(PHOENIX_BASE_URL)%'

when@test:
    services:
        App\Tests\TestDoubles\PhoenixApiClientStub:
            public: true

        App\Service\PhoenixService\PhoenixApiClientInterface:
            alias: App\Tests\TestDoubles\PhoenixApiClientStub
